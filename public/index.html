<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reto 10 Segundos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#09090b; --surface:#111113; --surface-2:#18181b; --border:#27272a;
            --text:#fafafa; --text-2:#a1a1aa; --text-3:#52525b;
            --amber:#f59e0b; --amber-dim:rgba(245,158,11,.1);
            --green:#22c55e; --green-dim:rgba(34,197,94,.08);
            --red:#ef4444;
            --ring-base:#27272a;
            --mono:'IBM Plex Mono',monospace; --body:'Sora',sans-serif;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
        .scr{display:none;min-height:100vh;padding:24px 20px 100px;flex-direction:column;align-items:center;justify-content:center}
        .scr.on{display:flex}
        .container{width:100%;max-width:420px;text-align:center}
        
        /* Prize & Objective */
        .prize{display:inline-flex;align-items:center;gap:8px;background:var(--amber-dim);border:1px solid rgba(245,158,11,.2);border-radius:100px;padding:8px 20px;margin-bottom:32px}
        .prize-dot{width:6px;height:6px;background:var(--amber);border-radius:50%;box-shadow: 0 0 8px var(--amber)}
        .prize-text{font-size:.8rem;font-weight:600;color:var(--amber);letter-spacing:.04em}
        .objective{color:var(--text-3);font-size:.8rem;margin-bottom:8px}

        /* Ring & Timer */
        .ring-wrap{position:relative;width:280px;height:280px;margin:24px auto}
        .ring-svg{width:100%;height:100%;transform:rotate(-90deg)}
        .ring-bg{fill:none;stroke:var(--ring-base);stroke-width:2}
        .ring-fill{fill:none;stroke:var(--text-3);stroke-width:3;stroke-linecap:round;stroke-dasharray:816;stroke-dashoffset:816;transition:stroke .4s ease}
        .ring-fill.near{stroke:var(--amber)!important}
        .ring-fill.win{stroke:var(--green)!important}
        .ring-fill.lose{stroke:var(--red)!important}
        .ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .tmr{font-family:var(--mono);font-size:3.8rem;font-weight:600;color:var(--text)}
        .tmr.win{color:var(--green)}
        .tmr.lose{color:var(--red)}

        /* Input & Buttons */
        input{width:100%;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:var(--mono);text-align:center;margin-bottom:16px;outline:none}
        button{width:100%;padding:16px;border-radius:12px;border:none;font-family:var(--body);font-weight:600;font-size:.95rem;cursor:pointer;transition:all .15s ease}
        .btn-go{background:var(--text);color:var(--bg)}
        .btn-go.run{background:var(--red);color:#fff}
        
        /* Overlays */
        .ov{display:none;position:fixed;inset:0;z-index:998;background:rgba(9,9,11,.95);backdrop-filter:blur(8px);flex-direction:column;align-items:center;justify-content:center;padding:24px}
        .ov.on{display:flex}
        .ov-icon{font-size:4rem;margin-bottom:16px}
        .ov-title{font-size:2rem;font-weight:800;margin-bottom:8px}
        .ov-time{font-family:var(--mono);font-size:1.5rem;color:var(--text-2);margin-bottom:24px}
        
        /* Toast */
        #toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:12px 24px;border-radius:12px;z-index:1001;transition:transform .4s}
        #toast.vis{transform:translateX(-50%) translateY(0)}

        /* Nav */
        .nav{position:fixed;bottom:0;width:100%;background:var(--surface);border-top:1px solid var(--border);display:flex}
        .nav-b{flex:1;padding:16px;text-align:center;color:var(--text-3);cursor:pointer;font-size:.75rem;font-weight:600}
        .nav-b.act{color:var(--text)}
    </style>
</head>
<body>
    <div id="toast">Error</div>

    <div class="ov" id="resultOv">
        <div class="ov-icon" id="ovIcon">🎯</div>
        <div class="ov-title" id="ovTitle">¡GANASTE!</div>
        <div class="ov-time" id="ovTime">10.00s</div>
        <button class="btn-go" style="width:auto; padding:12px 40px" onclick="resetGameUI()">CERRAR</button>
    </div>

    <div id="calScr" class="scr on">
        <h2>Conectando...</h2>
    </div>

    <div id="gameScr" class="scr">
        <div class="container">
            <div class="prize"><div class="prize-dot"></div><span class="prize-text">$200 EN JUEGO</span></div>
            <div class="objective">Detén el reloj entre <b>09.00s y 11.00s</b></div>
            <div class="ring-wrap">
                <svg class="ring-svg" viewBox="0 0 280 280">
                    <circle class="ring-bg" cx="140" cy="140" r="130"/>
                    <circle class="ring-fill" id="ringFill" cx="140" cy="140" r="130"/>
                </svg>
                <div class="ring-inner">
                    <div id="tmr" class="tmr">00.00</div>
                </div>
            </div>
            <div id="inputArea">
                <input type="text" id="playerKey" placeholder="INGRESA TU CLAVE" autocomplete="off">
            </div>
            <button id="btn" class="btn-go" onclick="handleBtn(event)">INICIAR RETO</button>
        </div>
    </div>

    <div id="admScr" class="scr">
        <div class="container">
            <div id="admLogin">
                <input type="password" id="admKey" placeholder="Contraseña Admin">
                <button class="btn-go" onclick="admAuth()">Acceder</button>
            </div>
            <div id="admBody" style="display:none; width:100%">
                <div style="background:var(--surface); padding:16px; border-radius:12px; margin-bottom:16px">
                   <input type="number" id="genCount" value="10" style="margin:0; width:80px">
                   <button onclick="generateKeys()" style="width:auto; background:var(--green); color:#000">Generar</button>
                   <button id="btnDl" onclick="downloadKeys()" style="display:none; width:auto; background:var(--text); margin-top:8px">Descargar .TXT</button>
                </div>
                <table style="width:100%; font-size:.8rem; border-collapse:collapse">
                    <tbody id="admTb"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="nav">
        <div id="nGame" class="nav-b act" onclick="navTo('game')">JUEGO</div>
        <div id="nAdmin" class="nav-b" onclick="navTo('admin')">ADMIN</div>
    </div>

    <script>
        // MOTOR VISUAL (Sincronizado con script.js)
        var ring = document.getElementById('ringFill');
        var CIRC = 2 * Math.PI * 130;
        ring.style.strokeDasharray = CIRC;
        ring.style.strokeDashoffset = CIRC;

        function updateRing() {
            if (!document.getElementById('tmr').classList.contains('run')) return;
            var val = parseFloat(document.getElementById('tmr').textContent);
            var progress = Math.min(val / 14, 1);
            ring.style.strokeDashoffset = CIRC - (progress * CIRC);
            
            // Lógica de color de advertencia (1 segundo de tolerancia)
            if (val >= 9.00 && val <= 11.00) ring.classList.add('near');
            else ring.classList.remove('near');
            
            requestAnimationFrame(updateRing);
        }

        // Esta función la llama el script.js al terminar
        window.showFinalResult = function(isWinner, timeText) {
            var ov = document.getElementById('resultOv');
            var ring = document.getElementById('ringFill');
            
            document.getElementById('ovTime').textContent = timeText + "s";
            ring.classList.remove('near');
            
            if(isWinner) {
                document.getElementById('ovIcon').textContent = "🎯";
                document.getElementById('ovTitle').textContent = "¡GANASTE!";
                document.getElementById('ovTitle').style.color = "var(--green)";
                ring.classList.add('win');
            } else {
                document.getElementById('ovIcon').textContent = "⏱";
                document.getElementById('ovTitle').textContent = "FUERA DE RANGO";
                document.getElementById('ovTitle').style.color = "var(--red)";
                ring.classList.add('lose');
            }
            ov.classList.add('on');
        };

        window.resetGameUI = function() {
            document.getElementById('resultOv').classList.remove('on');
            document.getElementById('tmr').textContent = "00.00";
            document.getElementById('tmr').className = "tmr";
            document.getElementById('ringFill').className = "ring-fill";
            document.getElementById('ringFill').style.strokeDashoffset = CIRC;
            document.getElementById('inputArea').style.display = "block";
            document.getElementById('playerKey').value = "";
            document.getElementById('btn').textContent = "INICIAR RETO";
            document.getElementById('btn').className = "btn-go";
            document.getElementById('btn').disabled = false;
        };
    </script>
    <script src="/script.js"></script>
</body>
</html>
