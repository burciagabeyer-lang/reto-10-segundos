<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto 10 Segundos</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;700&display=swap">
    <style>
        :root { --bg: #0a0a0c; --card: #141417; --cyan: #00f2ff; --green: #00ff88; --red: #ff3e3e; --gold: #ffcc00; --dim: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .scr { display: none; min-height: 100vh; padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .scr.on { display: flex; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        
        /* Juego */
        .target { font-size: 1.2rem; margin-bottom: 20px; color: var(--dim); }
        .target b { color: #fff; }
        .tmr { font-family: 'Orbitron', sans-serif; font-size: 4rem; margin: 30px 0; font-weight: 700; transition: all 0.2s; }
        .tmr.run { color: var(--cyan); }
        .tmr.win { color: var(--green); }
        .tmr.lose { color: var(--red); }
        
        input { width: 100%; padding: 15px; background: #000; border: 2px solid #333; border-radius: 12px; color: #fff; font-size: 1rem; text-align: center; margin-bottom: 20px; outline: none; }
        input:focus { border-color: var(--cyan); }
        
        button { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: transform 0.1s; }
        .btn-go { background: var(--cyan); color: #000; }
        .btn-go.run { background: var(--red); color: #fff; }
        button:active { transform: scale(0.96); }

        /* Admin Tools */
        .adm-tools { background: #1a1a1f; padding: 20px; border-radius: 15px; margin-bottom: 20px; width: 100%; }
        .gen-box { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-gen { background: var(--cyan); color: #000; flex: 2; }
        .btn-dl { background: var(--green); color: #000; margin-top: 10px; }
        #genCount { width: 80px; margin-bottom: 0; }

        /* Tabla */
        .tb-wrap { width: 100%; overflow-x: auto; background: var(--card); border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        th { color: var(--dim); font-weight: normal; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #141417; display: flex; border-top: 1px solid #222; }
        .nav-b { flex: 1; padding: 15px; text-align: center; color: var(--dim); cursor: pointer; font-weight: bold; }
        .nav-b.act { color: var(--cyan); border-top: 2px solid var(--cyan); }
        #toast { position: fixed; top: 20px; background: var(--red); padding: 12px 24px; border-radius: 8px; transform: translateY(-100px); transition: 0.4s; z-index: 1000; }
        #toast.vis { transform: translateY(0); }
    </style>
</head>
<body>
    <div id="toast">Error</div>

    <div id="calScr" class="scr on">
        <div class="container">
            <h2 style="margin-bottom:10px">Iniciando...</h2>
            <p id="calDet" style="color:var(--dim)">Conectando con el servidor...</p>
        </div>
    </div>

    <div id="gameScr" class="scr">
        <div class="container">
            <div class="target">Objetivo: <b>10.00 segundos</b></div>
            <div id="tmr" class="tmr">00.000</div>
            <input type="text" id="playerKey" placeholder="Ingresa tu clave de acceso">
            <button id="btn" class="btn-go" onclick="handleBtn(event)">INICIAR</button>
        </div>
    </div>

    <div id="admScr" class="scr">
        <div class="container" style="max-width: 600px;">
            <div id="admLogin">
                <input type="password" id="admKey" placeholder="Clave de Admin">
                <button class="btn-go" onclick="admAuth()">Entrar al Panel</button>
            </div>
            <div id="admBody" style="display:none; width: 100%;">
                <div class="adm-tools">
                    <div class="gen-box">
                        <input type="number" id="genCount" value="10" min="1">
                        <button class="btn-gen" onclick="generateKeys()">Generar Claves</button>
                    </div>
                    <button id="btnDl" class="btn-dl" style="display:none;" onclick="downloadKeys()">⬇️ Descargar .TXT</button>
                </div>
                <div class="tb-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Clave</th>
                                <th>Tiempo</th>
                                <th>Dif</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="admTb"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="nav">
        <div id="nGame" class="nav-b act" onclick="navTo('game')">JUEGO</div>
        <div id="nAdmin" class="nav-b" onclick="navTo('admin')">ADMIN</div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
